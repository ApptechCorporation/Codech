name: Build & Publish Debug APK

on:
  push:
    tags:
      - '*'
   
jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - name: Make Gradle executable
      run: chmod +x ./gradlew
    - name: Run Spotless
      run: ./gradlew :app:spotlessApply
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    - name: Create Github Release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        prerelease: false
        body_path: changelogs/${{ github.ref_name }}/changelog.md
        files: |
           app/build/outputs/apk/debug/*arm64-v8a*.apk
           app/build/outputs/apk/debug/*armeabi-v7a*.apk
           app/build/outputs/apk/debug/*-x86-*.apk
           app/build/outputs/apk/debug/*-x86_64*.apk
           app/build/outputs/apk/debug/*universal*.apk       
